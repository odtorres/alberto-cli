name: Linux packages

on:
  release:
    types: [published]
  # dist crea el release con GITHUB_TOKEN, que NO dispara otros workflows:
  # este dispatch manual permite empaquetar un tag ya publicado.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag del release (ej v0.2.0)"
        required: true

permissions:
  contents: write

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  nfpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download release tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "$TAG" \
            --pattern '*x86_64-unknown-linux-gnu.tar.xz' --output linux.tar.xz
          tar -xf linux.tar.xz --strip-components=1
      - name: Install nfpm
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download -R goreleaser/nfpm --pattern '*_amd64.deb' --output /tmp/nfpm.deb
          sudo dpkg -i /tmp/nfpm.deb
      - name: Package deb + rpm
        env:
          SEMVER: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          export SEMVER="${SEMVER#v}"
          envsubst '${SEMVER}' < nfpm.yaml > nfpm-resolved.yaml
          nfpm package -f nfpm-resolved.yaml -p deb
          nfpm package -f nfpm-resolved.yaml -p rpm
      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" ./*.deb ./*.rpm
